<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>HavenCraft & Living Furnitures</title>
    <script>
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + l.pathname.split('/').slice(2).join('/') +
        (l.search ? '&q=' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
